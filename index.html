<!DOCTYPE html>
<!--
 This is new pathc form chatgdp
-->
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Game Timer PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1e1e2f,#12121a);
  color:white;
}

.container { padding:15px; }

.player {
  padding:15px;
  border-radius:15px;
  margin:8px 0;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.active {
  box-shadow:0 0 15px yellow;
  transform:scale(1.02);
}

button {
  width:100%;
  padding:15px;
  margin:5px 0;
  font-size:18px;
  border:none;
  border-radius:12px;
}

.primary { background:#4CAF50; color:white; }
.secondary { background:#333; color:white; }

.topbar {
  position:sticky;
  top:0;
  background:#0008;
  padding:10px;
  backdrop-filter:blur(10px);
}
</style>

</head>

<body>

<div class="topbar">
  <b id="room"></b>
</div>

<div class="container">

<div id="setup">
  <input id="playerCount" type="number" min="3" max="10" value="3">
  <button class="primary" onclick="setupPlayers()">สร้างผู้เล่น</button>
  <div id="playersSetup"></div>

  <select id="mode">
    <option value="turn">Turn</option>
    <option value="round">Round</option>
  </select>

<button class="primary" onclick="startGame()">Start Game</button>

</div>

<div id="gameUI" style="display:none">
  <h2 id="status"></h2>
  <div id="players"></div>

<button class="primary" onclick="nextTurn()">➡️ Next Turn</button> <button class="secondary" onclick="toggleRun()">⏯ Pause/Resume</button> <button class="secondary" onclick="resetGame()">🔄 Reset</button> <button class="secondary" onclick="startAudio()">🎤 Clap to Skip</button>

</div>

</div>

<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBUOEttDrqZmHRHN4m3uoMPj1YTmHtJUfw",
  authDomain: "boardgame-timer-8d216.firebaseapp.com",
  databaseURL: "https://boardgame-timer-8d216-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "boardgame-timer-8d216",
  storageBucket: "boardgame-timer-8d216.firebasestorage.app",
  messagingSenderId: "1023832681904",
  appId: "1:1023832681904:web:ccd85c3bdabc5840e43a75"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🧠 session
let gameId = new URLSearchParams(location.search).get("game") || genId();
let userId = localStorage.getItem("uid") || genId();
localStorage.setItem("uid", userId);

const ref = db.ref("games/" + gameId);

if (!location.search.includes("game")) {
  history.replaceState({}, "", "?game="+gameId);
}

document.getElementById("room").innerText = "Room: "+gameId;

// 🎲 setup
function setupPlayers(){
  let n = playerCount.value;
  let div = playersSetup;
  div.innerHTML="";

  for(let i=0;i<n;i++){
    div.innerHTML += `
    <div>
      <input id="name${i}" placeholder="Player ${i+1}">
      <input type="color" id="color${i}">
    </div>`;
  }
}

// 🚀 start
function startGame(){
  let n = playerCount.value;
  let players=[];

  for(let i=0;i<n;i++){
    players.push({
      name:document.getElementById("name"+i).value||"P"+(i+1),
      color:document.getElementById("color"+i).value||randColor(),
      time:60
    });
  }

  ref.set({
    players,
    currentTurn:0,
    running:true,
    mode:mode.value,
    lastUpdate:Date.now()
  });
}

// 🔄 realtime sync
let game=null;

ref.on("value", snap=>{
  game=snap.val();
  if(!game)return;

  setup.style.display="none";
  gameUI.style.display="block";

  render();
});

// ⏱️ timer (hostless shared logic)
setInterval(()=>{
  if(!game || !game.running) return;

  ref.transaction(g=>{
    if(!g) return g;

    let now=Date.now();
    if(now - g.lastUpdate < 900) return g;

    g.lastUpdate=now;

    if(g.mode==="turn"){
      g.players[g.currentTurn].time--;
      if(g.players[g.currentTurn].time<=0){
        g.currentTurn=(g.currentTurn+1)%g.players.length;
      }
    }

    return g;
  });
},1000);

// 🔁 next turn (multiplayer safe)
function nextTurn(){
  ref.transaction(g=>{
    if(!g)return g;
    g.currentTurn=(g.currentTurn+1)%g.players.length;
    return g;
  });
}

// ⏯ toggle
function toggleRun(){
  ref.transaction(g=>{
    if(!g)return g;
    g.running=!g.running;
    return g;
  });
}

// 🔄 reset
function resetGame(){
  ref.remove();
  location.reload();
}

// 🎨 render
function render(){
  let div=document.getElementById("players");
  div.innerHTML="";

  game.players.forEach((p,i)=>{
    div.innerHTML+=`
    <div class="player ${i===game.currentTurn?'active':''}" style="background:${p.color}">
      <span>${p.name}</span>
      <span>${p.time}s</span>
    </div>`;
  });

  status.innerText="Turn: "+game.players[game.currentTurn].name;
}

// 🎤 audio
function startAudio(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ctx=new AudioContext();
    const mic=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser();

    mic.connect(analyser);
    analyser.fftSize=256;

    const data=new Uint8Array(analyser.frequencyBinCount);

    function loop(){
      analyser.getByteFrequencyData(data);
      let v=data.reduce((a,b)=>a+b)/data.length;

      if(v>90) nextTurn();

      requestAnimationFrame(loop);
    }
    loop();
  });
}

// 🔑 utils
function genId(){ return Math.random().toString(36).substring(2,8); }
function randColor(){ return "#"+Math.floor(Math.random()*16777215).toString(16); }

</script>

</body>
</html>
